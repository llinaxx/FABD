<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игрушки для домашних животных</title>
    <!-- Подключаем CSS -->
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <h1 class="header__title">Магазин игрушек для домашних животных</h1>
        </header>

        <main class="main">
            <div class="cards-grid">
                
                <!-- Карточка 1: Кость -->
                <div class="card">
                    <div class="card__image-container">
                        <img src="images/bone.jpg" alt="Игрушка Кость" class="card__image">
                    </div>
                    <div class="card__content">
                        <h2 class="card__title">Игрушка для собак "Кость"</h2>
                        <p class="card__description">Мягкая кость</p>
                        <div class="card__footer">
                            <span class="card__price">450 ₽</span>
                            <a href="#" class="card__button">В корзину</a>
                        </div>
                    </div>
                </div>

                <!-- Карточка 2: Утка -->
                <div class="card card--featured">
                    <div class="card__image-container">
                        <img src="images/duck.jpg" alt="Игрушка Утка" class="card__image">
                    </div>
                    <div class="card__content">
                        <h2 class="card__title">Игрушка для собак "Утка"</h2>
                        <p class="card__description">Мягкая утка с пищалкой</p>
                        <div class="card__footer">
                            <span class="card__price">650 ₽</span>
                            <a href="#" class="card__button">В корзину</a>
                        </div>
                    </div>
                </div>

                <!-- Карточка 3: Теннисный мяч -->
                <div class="card">
                    <div class="card__image-container">
                        <img src="images/ball.jpg" alt="Игрушка Теннисный мяч" class="card__image">
                    </div>
                    <div class="card__content">
                        <h2 class="card__title">Игрушка для собак "Теннисный мяч"</h2>
                        <p class="card__description">Классический теннисный мяч</p>
                        <div class="card__footer">
                            <span class="card__price">350 ₽</span>
                            <a href="#" class="card__button">В корзину</a>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <footer class="footer">
            <p class="footer__text">© 2026 Магазин игрушек для домашних животных</p>
        </footer>
    </div>
</body>
</html>
