<div class="home-content">
  <h2 class="is-center">Добавить заметку</h2>
  <form id="note-form" class="row is-center">
    <input class="col-9" type="text" id="note-input" placeholder="Введите текст заметки" required style="border: 1px solid #d4b89c; border-radius: 12px; padding: 10px;">
    <button class="col-3 button primary" type="submit" style="border-radius: 12px;">➕ Добавить</button>
  </form>

  <h2 class="is-center" style="margin-top: 2rem;">Список заметок</h2>
  <ul id="notes-list" style="list-style: none; padding-left: 0;"></ul>
</div>
